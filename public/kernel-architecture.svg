  <rect x="100" y="437" width="260" height="36" fill="none" stroke="#444" stroke-width="1" rx="2"/>
  <text x="230" y="460" text-anchor="middle" fill="#666" font-family="monospace" font-size="12">GitHub · Vercel · GCP · Slack</text>

  <!-- Stats watermark bottom-right -->
  <text x="775" y="430" text-anchor="end" fill="#333" font-family="monospace" font-size="10">1,000+ workers run</text>
  <text x="775" y="447" text-anchor="end" fill="#333" font-family="monospace" font-size="10">120+ days production</text>
  <text x="775" y="464" text-anchor="end" fill="#333" font-family="monospace" font-size="10">$350+ cost tracked</text>
</svg>
